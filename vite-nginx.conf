server {
    listen 80;

    location = / {
        return 301 /identity_journal/;
    }

    location /identity_journal/ {
        alias /usr/share/nginx/html/identity_journal/;
        index index.html;
        try_files $uri $uri/ /identity_journal/index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 404 /identity_journal/index.html;
}
